name: Feature fix stage 4

on:
  push:
    paths:
      - '.github/workflows/feature-fix-stage4.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Apply vendor data and favorite safeguards
        run: |
          python3 <<'PY'
          from pathlib import Path
          p=Path('server.js')
          s=p.read_text()
          old="async function vendorData(req,id){req.session.viewedVendors=req.session.viewedVendors||{}; if(!req.session.viewedVendors[id]){await q('UPDATE vendors SET views=views+1 WHERE id=$1',[id]); await q('INSERT INTO vendor_view_logs(vendor_id,user_id) VALUES($1,$2)',[id,req.session.user?.id||null]); req.session.viewedVendors[id]=Date.now();} const v=await q(`SELECT v.*, (SELECT ROUND(AVG(r.rating)::numeric,1) FROM reviews r WHERE r.vendor_id=v.id AND r.status='visible') avg_rating, (SELECT COUNT(*)::int FROM reviews r WHERE r.vendor_id=v.id AND r.status='visible') review_count, (SELECT COUNT(*)::int FROM favorites f WHERE f.vendor_id=v.id) favorite_count FROM vendors v WHERE v.id=$1`,[id]); if(v.rows[0]&&req.session.user){const fav=await q('SELECT 1 FROM favorites WHERE user_id=$1 AND vendor_id=$2',[req.session.user.id,id]); v.rows[0].is_favorited=!!fav.rows[0];} const reviews=await q('SELECT r.*,u.nickname FROM reviews r LEFT JOIN users u ON u.id=r.user_id WHERE r.vendor_id=$1 AND r.status=$2 ORDER BY r.id DESC',[id,'visible']); return {vendor:v.rows[0],reviews:reviews.rows};}"
          new="async function vendorData(req,id){const vendorId=parseInt(id||0,10); if(!vendorId)return {vendor:null,reviews:[]}; const v=await q(`SELECT v.*, (SELECT ROUND(AVG(r.rating)::numeric,1) FROM reviews r WHERE r.vendor_id=v.id AND r.status='visible') avg_rating, (SELECT COUNT(*)::int FROM reviews r WHERE r.vendor_id=v.id AND r.status='visible') review_count, (SELECT COUNT(*)::int FROM favorites f WHERE f.vendor_id=v.id) favorite_count FROM vendors v WHERE v.id=$1`,[vendorId]); if(!v.rows[0])return {vendor:null,reviews:[]}; req.session.viewedVendors=req.session.viewedVendors||{}; if(!req.session.viewedVendors[vendorId]){await q('UPDATE vendors SET views=views+1 WHERE id=$1',[vendorId]); await q('INSERT INTO vendor_view_logs(vendor_id,user_id) VALUES($1,$2)',[vendorId,req.session.user?.id||null]); req.session.viewedVendors[vendorId]=Date.now(); v.rows[0].views=Number(v.rows[0].views||0)+1;} if(req.session.user){const fav=await q('SELECT 1 FROM favorites WHERE user_id=$1 AND vendor_id=$2',[req.session.user.id,vendorId]); v.rows[0].is_favorited=!!fav.rows[0];} const reviews=await q('SELECT r.*,u.nickname FROM reviews r LEFT JOIN users u ON u.id=r.user_id WHERE r.vendor_id=$1 AND r.status=$2 ORDER BY r.id DESC',[vendorId,'visible']); return {vendor:v.rows[0],reviews:reviews.rows};}"
          s=s.replace(old,new)
          old="app.post('/favorite/:id',login,async(req,res)=>{const id=parseInt(req.params.id||0,10); if(id){await q('INSERT INTO favorites(user_id,vendor_id) VALUES($1,$2) ON CONFLICT(user_id,vendor_id) DO NOTHING',[req.session.user.id,id]);} res.redirect(req.get('referer')||'/');});"
          new="app.post('/favorite/:id',login,async(req,res)=>{const id=parseInt(req.params.id||0,10); if(id){const v=await q('SELECT id FROM vendors WHERE id=$1 AND status=$2',[id,'active']); if(v.rows[0])await q('INSERT INTO favorites(user_id,vendor_id) VALUES($1,$2) ON CONFLICT(user_id,vendor_id) DO NOTHING',[req.session.user.id,id]);} res.redirect(req.get('referer')||'/');});"
          s=s.replace(old,new)
          p.write_text(s)
          Path('.github/workflows/feature-fix-stage4.yml').unlink(missing_ok=True)
          PY
          node --check server.js
      - name: Commit feature fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then echo "No stage 4 changes"; else git commit -m "Harden vendor view and favorite flow" && git push; fi
