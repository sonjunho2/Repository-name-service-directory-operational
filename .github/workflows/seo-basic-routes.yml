name: SEO basic routes

on:
  push:
    paths:
      - '.github/workflows/seo-basic-routes.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Add basic SEO routes
        run: |
          python3 <<'PY'
          from pathlib import Path
          p=Path('server.js')
          s=p.read_text()
          marker="app.get('/',async(req,res)=>res.render('index',await homeData(req)));"
          block="""app.get('/robots.txt',(req,res)=>{const base=req.protocol+'://'+req.get('host');res.type('text/plain').send('User-agent: *\\nAllow: /\\nDisallow: /admin\\nDisallow: /vendor-dashboard\\nDisallow: /mypage\\nSitemap: '+base+'/sitemap.xml\\n');});
app.get('/sitemap.xml',async(req,res)=>{const base=req.protocol+'://'+req.get('host');const rows=await q(\"SELECT id FROM vendors WHERE status='active' AND ad_type<>'none' AND expire_at IS NOT NULL AND expire_at>=CURRENT_DATE ORDER BY id DESC LIMIT 5000\");const urls=['/','/advertise','/apply'].map(x=>'<url><loc>'+base+x+'</loc></url>').concat(rows.rows.map(v=>'<url><loc>'+base+'/vendor/'+v.id+'</loc></url>'));res.type('application/xml').send('<?xml version=\"1.0\" encoding=\"UTF-8\"?><urlset xmlns=\"http://www.sitemaps.org/schemas/sitemap/0.9\">'+urls.join('')+'</urlset>');});
"""
          if "app.get('/robots.txt'" not in s:
            s=s.replace(marker,block+marker)
          p.write_text(s)
          Path('.github/workflows/seo-basic-routes.yml').unlink(missing_ok=True)
          PY
          node --check server.js
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then echo "No changes"; else git commit -m "Add basic SEO robots and sitemap routes" && git push; fi
