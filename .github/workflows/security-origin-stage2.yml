name: Security origin stage 2

on:
  push:
    paths:
      - '.github/workflows/security-origin-stage2.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Add same-origin POST guard
        run: |
          python3 <<'PY'
          from pathlib import Path
          p=Path('server.js')
          s=p.read_text()
          marker="app.use((req,res,next)=>{res.setHeader('X-Content-Type-Options','nosniff');res.setHeader('X-Frame-Options','SAMEORIGIN');res.setHeader('Referrer-Policy','strict-origin-when-cross-origin');res.setHeader('Permissions-Policy','camera=(), microphone=(), geolocation=()');next();});"
          block="""
app.use((req,res,next)=>{
  if(req.method!=='POST')return next();
  const origin=req.get('origin');
  if(!origin)return next();
  const expected=`${req.protocol}://${req.get('host')}`;
  if(origin!==expected)return res.status(403).send('잘못된 요청입니다.');
  next();
});
"""
          if "잘못된 요청입니다" not in s:
            s=s.replace(marker,marker+block)
          p.write_text(s)
          Path('.github/workflows/security-origin-stage2.yml').unlink(missing_ok=True)
          PY
          node --check server.js
          node --check restore-routes.js
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then echo "No changes"; else git commit -m "Add same-origin POST guard" && git push; fi
