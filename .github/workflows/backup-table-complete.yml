name: Backup table complete

on:
  push:
    paths:
      - '.github/workflows/backup-table-complete.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Add missing backup tables
        run: |
          python3 <<'PY'
          from pathlib import Path
          p=Path('server.js')
          s=p.read_text()
          old="const tables=['users','vendors','banners','reviews','notices','inquiries','flags','vendor_update_requests','vendor_banner_requests','vendor_ad_requests','favorites','app_settings'];"
          new="const tables=['users','vendors','banners','reviews','notices','inquiries','flags','vendor_update_requests','vendor_banner_requests','vendor_ad_requests','favorites','app_settings','payment_logs','vendor_view_logs'];"
          s=s.replace(old,new)
          p.write_text(s)
          Path('.github/workflows/backup-table-complete.yml').unlink(missing_ok=True)
          PY
          node --check server.js
          node --check restore-routes.js
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then echo "No changes"; else git commit -m "Include log tables in admin backup" && git push; fi
