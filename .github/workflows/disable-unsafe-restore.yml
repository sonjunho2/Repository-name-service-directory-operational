name: Disable unsafe restore

on:
  push:
    paths:
      - '.github/workflows/disable-unsafe-restore.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Disable restore route
        run: |
          python3 <<'PY'
          from pathlib import Path
          p=Path('server.js')
          s=p.read_text()
          a=s.find("app.post('/admin/restore-json'")
          b=s.find("app.post('/admin/settings/reset-data'", a)
          if a!=-1 and b!=-1 and '복원 기능 임시 비활성화' not in s[a:b]:
              s=s[:a]+"app.post('/admin/restore-json',admin,async(req,res)=>{await logAdmin(req,'복원 차단','system','restore','복원 기능 임시 비활성화');res.redirect('/admin#settings');});\n\n"+s[b:]
          p.write_text(s)
          Path('.github/workflows/disable-unsafe-restore.yml').unlink(missing_ok=True)
          PY
          node --check server.js
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then echo "No changes"; else git commit -m "Disable unsafe partial restore route" && git push; fi
