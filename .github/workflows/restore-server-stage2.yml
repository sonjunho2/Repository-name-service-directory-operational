name: Restore server stage 2

on:
  push:
    paths:
      - '.github/workflows/restore-server-stage2.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Restore server and disable legacy approve routes
        run: |
          git checkout 3be507182b50a1d4ecdc9357969bfc4c9a983dc0^ -- server.js
          python3 <<'PY'
          from pathlib import Path
          p=Path('server.js')
          s=p.read_text()
          old_banner="app.post('/admin/banner-requests/:id/approve',admin,async(req,res)=>{const r=await q('SELECT * FROM vendor_banner_requests WHERE id=$1',[req.params.id]); const x=r.rows[0]; if(!x)return res.redirect('/admin#bannerRequests'); await q('INSERT INTO banners(title,subtitle,link_url,position,sort_order,is_active,image_data) VALUES($1,$2,$3,$4,$5,$6,$7)',[x.title,x.subtitle,x.link_url||'#','premium',0,true,x.image_data]); await q('UPDATE vendor_banner_requests SET status=$1,admin_memo=$2,processed_at=now() WHERE id=$3',['approved',(req.body.admin_memo||'').slice(0,500),x.id]); await logAdmin(req,'배너신청 승인','banner_request',x.id,req.body.admin_memo||''); res.redirect('/admin#bannerRequests');});"
          s=s.replace(old_banner,"app.post('/admin/banner-requests/:id/approve',admin,async(req,res)=>{res.redirect('/admin#bannerRequests');});")
          start=s.find("app.post('/admin/ad-requests/:id/approve'")
          end=s.find("app.post('/admin/ad-requests/:id/reject'",start)
          if start!=-1 and end!=-1:
            s=s[:start]+"app.post('/admin/ad-requests/:id/approve',admin,async(req,res)=>{res.redirect('/admin#adRequests');});\n\n"+s[end:]
          p.write_text(s)
          Path('.github/workflows/restore-server-stage2.yml').unlink(missing_ok=True)
          PY
          node --check server.js
      - name: Commit restore
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Restore server and disable legacy approve routes"
          git push
