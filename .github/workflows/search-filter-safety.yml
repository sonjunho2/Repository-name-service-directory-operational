name: Search filter safety

on:
  push:
    paths:
      - '.github/workflows/search-filter-safety.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Patch search filter limits
        run: |
          python3 <<'PY'
          from pathlib import Path
          p=Path('server.js')
          s=p.read_text()
          old="const search=req.query.search||'', region=req.query.region||'', category=req.query.category||'', sort=req.query.sort||'default';"
          new="const search=(req.query.search||'').trim().slice(0,80), region=(req.query.region||'').trim().slice(0,50), category=(req.query.category||'').trim().slice(0,50), sort=(req.query.sort||'default').trim();"
          s=s.replace(old,new)
          p.write_text(s)
          Path('.github/workflows/search-filter-safety.yml').unlink(missing_ok=True)
          PY
          node --check server.js
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then echo "No changes"; else git commit -m "Limit public search filter inputs" && git push; fi
