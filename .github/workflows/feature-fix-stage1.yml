name: Feature fix stage 1

on:
  push:
    paths:
      - '.github/workflows/feature-fix-stage1.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Apply feature safety fixes
        run: |
          python3 <<'PY'
          from pathlib import Path
          p=Path('server.js')
          s=p.read_text()

          s=s.replace("/image\\/(jpeg|png|gif|jpg)/.test(file.mimetype)?cb(null,true):cb(new Error('이미지는 JPG, PNG, GIF만 가능합니다.'))", "/image\\/(jpeg|png|gif|jpg|webp)/.test(file.mimetype)?cb(null,true):cb(new Error('이미지는 JPG, PNG, GIF, WEBP만 가능합니다.'))")

          s=s.replace("await q('UPDATE vendor_ad_requests SET payment_status=$1 WHERE id=$2 AND user_id=$3',['waiting',req.params.id,req.session.user.id]);", "await q(\"UPDATE vendor_ad_requests SET payment_status=$1 WHERE id=$2 AND user_id=$3 AND status='new' AND payment_status='unpaid'\",['waiting',req.params.id,req.session.user.id]);")

          marker="""app.post('/vendor-dashboard/banner-request',login,async(req,res)=>{
  if(!req.session.user.is_vendor||!req.session.user.vendor_id)return res.redirect('/vendor-apply');

  const settings=await getSettings();
  const v=await q('SELECT * FROM vendors WHERE id=$1',[req.session.user.vendor_id]);
  const vendor=v.rows[0]||{};
"""
          repl="""app.post('/vendor-dashboard/banner-request',login,async(req,res)=>{
  if(!req.session.user.is_vendor||!req.session.user.vendor_id)return res.redirect('/vendor-apply');

  const settings=await getSettings();
  const v=await q('SELECT * FROM vendors WHERE id=$1',[req.session.user.vendor_id]);
  const vendor=v.rows[0]||{};
  if(!vendor.image_data)return res.redirect('/vendor-dashboard?panel=banner');
  const pending=await q(\"SELECT id FROM vendor_banner_requests WHERE user_id=$1 AND vendor_id=$2 AND status='new' LIMIT 1\",[req.session.user.id,req.session.user.vendor_id]);
  if(pending.rows[0])return res.redirect('/vendor-dashboard?panel=banner&pay=banner&id='+pending.rows[0].id);
"""
          if marker in s and "const pending=await q(\"SELECT id FROM vendor_banner_requests" not in s:
              s=s.replace(marker,repl)

          marker2="""app.post('/vendor-dashboard/ad-request',login,async(req,res)=>{
  if(!req.session.user.is_vendor||!req.session.user.vendor_id)return res.redirect('/vendor-apply');

  const settings=await getSettings();
  const v=await q('SELECT * FROM vendors WHERE id=$1',[req.session.user.vendor_id]);
  const vendor=v.rows[0]||{};

  const productType=req.body.product_type||'renewal_general';
"""
          repl2="""app.post('/vendor-dashboard/ad-request',login,async(req,res)=>{
  if(!req.session.user.is_vendor||!req.session.user.vendor_id)return res.redirect('/vendor-apply');

  const settings=await getSettings();
  const v=await q('SELECT * FROM vendors WHERE id=$1',[req.session.user.vendor_id]);
  const vendor=v.rows[0]||{};

  const productType=req.body.product_type||'renewal_general';
  const pending=await q(\"SELECT id,product_type FROM vendor_ad_requests WHERE user_id=$1 AND vendor_id=$2 AND status='new' AND product_type=$3 LIMIT 1\",[req.session.user.id,req.session.user.vendor_id,productType]);
  if(pending.rows[0])return res.redirect('/vendor-dashboard?panel='+(productType==='renewal_banner'?'banner':'plan')+'&pay=ad&id='+pending.rows[0].id);
"""
          if marker2 in s and "SELECT id,product_type FROM vendor_ad_requests" not in s:
              s=s.replace(marker2,repl2)

          p.write_text(s)
          Path('.github/workflows/feature-fix-stage1.yml').unlink(missing_ok=True)
          PY
          node --check server.js
      - name: Commit feature fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then echo "No feature changes"; else git commit -m "Fix request payment safeguards and WEBP uploads" && git push; fi
