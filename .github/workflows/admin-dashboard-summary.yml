name: Admin dashboard summary

on:
  push:
    paths:
      - '.github/workflows/admin-dashboard-summary.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Add dashboard aggregate summary
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re
          p=Path('server.js')
          s=p.read_text()
          marker="  res.render('admin',{users:users.rows,vendors:vendors.rows,banners:banners.rows,reviews:reviews.rows,events:events.rows,notices:notices.rows,inquiries:inquiries.rows,flags:flags.rows,vendorRequests:vendorRequests.rows,bannerRequests:bannerRequests.rows,adRequests:adRequests.rows,adminLogs:adminLogs.rows,paymentLogs:paidRows,revenueStats,settings,dashboardStats});"
          insert="""  const scalar=async(sql)=>Number((await q(sql)).rows[0]?.v||0);
  const adminSummary={
    totalUsers:await scalar(\"SELECT COUNT(*) v FROM users\"),
    totalVendors:await scalar(\"SELECT COUNT(*) v FROM vendors\"),
    activeVendors:await scalar(\"SELECT COUNT(*) v FROM vendors WHERE status='active'\"),
    totalReviews:await scalar(\"SELECT COUNT(*) v FROM reviews\"),
    todayViews:await scalar(\"SELECT COUNT(*) v FROM vendor_view_logs WHERE created_at>=CURRENT_DATE\"),
    todayUsers:await scalar(\"SELECT COUNT(*) v FROM users WHERE created_at>=CURRENT_DATE\"),
    todayInquiries:await scalar(\"SELECT COUNT(*) v FROM inquiries WHERE created_at>=CURRENT_DATE\"),
    pendingInquiries:await scalar(\"SELECT COUNT(*) v FROM inquiries WHERE status='new'\"),
    pendingVendorRequests:await scalar(\"SELECT COUNT(*) v FROM vendor_update_requests WHERE status='new'\"),
    pendingAdRequests:await scalar(\"SELECT COUNT(*) v FROM vendor_ad_requests WHERE status='new'\"),
    pendingBannerRequests:await scalar(\"SELECT COUNT(*) v FROM vendor_banner_requests WHERE status='new'\"),
    waitingPayments:await scalar(\"SELECT COUNT(*) v FROM (SELECT payment_status FROM vendor_ad_requests UNION ALL SELECT payment_status FROM vendor_banner_requests) x WHERE payment_status='waiting'\"),
    pendingReports:await scalar(\"SELECT COUNT(*) v FROM flags WHERE status='new'\"),
    activeAds:await scalar(\"SELECT COUNT(*) v FROM vendors WHERE status='active' AND ad_type<>'none'\"),
    activeBanners:await scalar(\"SELECT COUNT(*) v FROM vendors WHERE status='active' AND banner_active=true\"),
    expiring7:await scalar(\"SELECT COUNT(*) v FROM vendors WHERE expire_at IS NOT NULL AND expire_at>=CURRENT_DATE AND expire_at<=CURRENT_DATE+INTERVAL '7 days'\"),
    todayRevenue:await scalar(\"SELECT COALESCE(SUM(krw_price),0) v FROM payment_logs WHERE paid_at>=CURRENT_DATE\"),
    monthRevenue:await scalar(\"SELECT COALESCE(SUM(krw_price),0) v FROM payment_logs WHERE date_trunc('month',paid_at)=date_trunc('month',CURRENT_DATE)\"),
    totalRevenue:await scalar(\"SELECT COALESCE(SUM(krw_price),0) v FROM payment_logs\")
  };
"""
          if 'const adminSummary={' not in s:
            s=s.replace(marker,insert+marker.replace("res.render('admin',{","res.render('admin',{adminSummary,"))
          p.write_text(s)

          p=Path('views/admin.ejs')
          e=p.read_text()
          new_section='''<section id="dashboard" class="panel admin-panel active">
<h2>대시보드</h2>
<%
  const S=(typeof adminSummary!=='undefined'&&adminSummary)?adminSummary:{};
  const money=n=>Number(n||0).toLocaleString()+"원";
  const num=n=>Number(n||0).toLocaleString();
%>
<div class="dash-grid">
  <div class="dash-card today"><b>오늘 방문</b><strong><%=num(S.todayViews)%></strong><span class="stat-note">업체 상세 조회 기준</span></div>
  <div class="dash-card today"><b>오늘 가입</b><strong><%=num(S.todayUsers)%></strong><span class="stat-note">신규 회원</span></div>
  <div class="dash-card today"><b>오늘 입점신청</b><strong><%=num(S.todayInquiries)%></strong><span class="stat-note">일반/입점 문의</span></div>
  <div class="dash-card hot"><b>오늘 매출</b><strong><%=money(S.todayRevenue)%></strong><span class="stat-note">입금확인 완료 기준</span></div>
</div>
<div class="dash-grid">
  <div class="dash-card"><b>이번달 매출</b><strong><%=money(S.monthRevenue)%></strong></div>
  <div class="dash-card"><b>누적 매출</b><strong><%=money(S.totalRevenue)%></strong></div>
  <div class="dash-card"><b>활성 광고</b><strong><%=num(S.activeAds)%></strong><span class="stat-note">일반/추천 노출</span></div>
  <div class="dash-card"><b>프리미엄 배너</b><strong><%=num(S.activeBanners)%></strong></div>
</div>
<div class="dash-grid">
  <a class="dash-card alert" href="#inquiries" data-panel="inquiries"><b>입점 승인대기</b><strong><%=num(S.pendingInquiries)%></strong></a>
  <a class="dash-card warn" href="#vendorRequests" data-panel="vendorRequests"><b>수정요청 대기</b><strong><%=num(S.pendingVendorRequests)%></strong></a>
  <a class="dash-card warn" href="#adCenter" data-panel="adCenter"><b>광고/배너 신청</b><strong><%=num((S.pendingAdRequests||0)+(S.pendingBannerRequests||0))%></strong></a>
  <a class="dash-card alert" href="#adCenter" data-panel="adCenter"><b>입금확인 대기</b><strong><%=num(S.waitingPayments)%></strong></a>
</div>
<div class="dash-grid">
  <a class="dash-card alert" href="#reports" data-panel="reports"><b>신고 대기</b><strong><%=num(S.pendingReports)%></strong></a>
  <a class="dash-card warn" href="#vendors" data-panel="vendors"><b>7일 내 만료</b><strong><%=num(S.expiring7)%></strong></a>
  <div class="dash-card"><b>전체 회원</b><strong><%=num(S.totalUsers)%></strong></div>
  <div class="dash-card"><b>전체 업체/후기</b><strong><%=num(S.totalVendors)%> / <%=num(S.totalReviews)%></strong></div>
</div>
<div class="dashboard-simple">
  <div class="dashboard-box">
    <h3>빠른 이동</h3>
    <div class="dashboard-quick">
      <a href="#vendors" data-panel="vendors">업체목록<small>등록/수정/비활성화</small></a>
      <a href="#adCenter" data-panel="adCenter">광고센터<small>광고 신청/입금확인</small></a>
      <a href="#revenue" data-panel="revenue">결제내역<small>매출/결제 확인</small></a>
      <a href="#settings" data-panel="settings">환경설정<small>가격/백업/복원</small></a>
    </div>
  </div>
</div>
</section>'''
          if 'adminSummary' not in e:
            e=re.sub(r'<section id="dashboard" class="panel admin-panel active">.*?</section>', new_section, e, count=1, flags=re.S)
          p.write_text(e)
          Path('.github/workflows/admin-dashboard-summary.yml').unlink(missing_ok=True)
          PY
          node --check server.js
          node --check restore-routes.js
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then echo "No changes"; else git commit -m "Enhance admin dashboard summary" && git push; fi
