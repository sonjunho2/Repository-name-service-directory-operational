name: Settings validation

on:
  push:
    paths:
      - '.github/workflows/settings-validation.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Patch settings validation
        run: |
          python3 <<'PY'
          from pathlib import Path
          p=Path('server.js')
          s=p.read_text()
          old="app.post('/admin/settings/options',admin,async(req,res)=>{const categories=(req.body.categories||'').split(/\\r?\\n/).map(x=>x.trim()).filter(Boolean).join('\\n'); const regions=(req.body.regions||'').split(/\\r?\\n/).map(x=>x.trim()).filter(Boolean).join('\\n');\n  const fields={categories,regions,usdt_address:req.body.usdt_address||'',usdt_network:req.body.usdt_network||'TRC20',usdt_krw_rate:req.body.usdt_krw_rate||'1400',banner_price_krw:req.body.banner_price_krw||'100000',ad_price_krw_30:req.body.ad_price_krw_30||'100000',ad_price_krw_60:req.body.ad_price_krw_60||'180000',ad_price_krw_90:req.body.ad_price_krw_90||'250000',general_register_price_krw:req.body.general_register_price_krw||'30000',recommended_register_price_krw:req.body.recommended_register_price_krw||'70000',general_to_recommended_price_krw:req.body.general_to_recommended_price_krw||'40000',general_to_banner_price_krw:req.body.general_to_banner_price_krw||'100000',recommended_to_banner_price_krw:req.body.recommended_to_banner_price_krw||'70000',default_register_days:req.body.default_register_days||'30'};"
          new="app.post('/admin/settings/options',admin,async(req,res)=>{const categories=(req.body.categories||'').split(/\\r?\\n/).map(x=>x.trim()).filter(Boolean).slice(0,50).join('\\n'); const regions=(req.body.regions||'').split(/\\r?\\n/).map(x=>x.trim()).filter(Boolean).slice(0,50).join('\\n'); const money=(v,d)=>{const n=parseInt(v,10);return Number.isFinite(n)&&n>=0&&n<=100000000?String(n):String(d)}; const days=(v,d)=>{const n=parseInt(v,10);return Number.isFinite(n)&&n>=1&&n<=3650?String(n):String(d)};\n  const fields={categories,regions,usdt_address:(req.body.usdt_address||'').trim().slice(0,200),usdt_network:(req.body.usdt_network||'TRC20').trim().slice(0,30),usdt_krw_rate:money(req.body.usdt_krw_rate,1400),banner_price_krw:money(req.body.banner_price_krw,100000),ad_price_krw_30:money(req.body.ad_price_krw_30,100000),ad_price_krw_60:money(req.body.ad_price_krw_60,180000),ad_price_krw_90:money(req.body.ad_price_krw_90,250000),general_register_price_krw:money(req.body.general_register_price_krw,30000),recommended_register_price_krw:money(req.body.recommended_register_price_krw,70000),general_to_recommended_price_krw:money(req.body.general_to_recommended_price_krw,40000),general_to_banner_price_krw:money(req.body.general_to_banner_price_krw,100000),recommended_to_banner_price_krw:money(req.body.recommended_to_banner_price_krw,70000),default_register_days:days(req.body.default_register_days,30)};"
          s=s.replace(old,new)
          old2="app.post('/admin/settings/admin-account',admin,async(req,res)=>{const username=(req.body.username||'').trim(); const nickname=(req.body.nickname||'관리자').trim(); const password=(req.body.password||'').trim(); if(!username)return res.redirect('/admin#settings'); if(password){const h=await bcrypt.hash(password,10); await q('UPDATE users SET username=$1,nickname=$2,password_hash=$3 WHERE id=$4 AND role=$5',[username,nickname,h,req.session.user.id,'admin']);}else{await q('UPDATE users SET username=$1,nickname=$2 WHERE id=$3 AND role=$4',[username,nickname,req.session.user.id,'admin']);} req.session.user.username=username; req.session.user.nickname=nickname; await logAdmin(req,'관리자 계정 수정','settings','admin-account',username); res.redirect('/admin#settings');});"
          new2="app.post('/admin/settings/admin-account',admin,async(req,res)=>{const username=(req.body.username||'').trim(); const nickname=(req.body.nickname||'관리자').trim().slice(0,50); const password=(req.body.password||'').trim(); if(!/^[a-zA-Z0-9_]{4,30}$/.test(username))return res.redirect('/admin#settings'); if(password&&password.length<8)return res.redirect('/admin#settings'); if(password){const h=await bcrypt.hash(password,10); await q('UPDATE users SET username=$1,nickname=$2,password_hash=$3 WHERE id=$4 AND role=$5',[username,nickname||'관리자',h,req.session.user.id,'admin']);}else{await q('UPDATE users SET username=$1,nickname=$2 WHERE id=$3 AND role=$4',[username,nickname||'관리자',req.session.user.id,'admin']);} req.session.user.username=username; req.session.user.nickname=nickname||'관리자'; await logAdmin(req,'관리자 계정 수정','settings','admin-account',username); res.redirect('/admin#settings');});"
          s=s.replace(old2,new2)
          p.write_text(s)
          Path('.github/workflows/settings-validation.yml').unlink(missing_ok=True)
          PY
          node --check server.js
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then echo "No changes"; else git commit -m "Validate admin settings inputs" && git push; fi
