name: Performance index stage 1

on:
  push:
    paths:
      - '.github/workflows/perf-index-stage1.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Add database indexes
        run: |
          python3 <<'PY'
          from pathlib import Path
          p=Path('server.js')
          s=p.read_text()
          marker="await q(`CREATE TABLE IF NOT EXISTS vendor_view_logs(id SERIAL PRIMARY KEY,vendor_id int,user_id int,created_at timestamp DEFAULT now())`);"
          add="""await q(`CREATE TABLE IF NOT EXISTS vendor_view_logs(id SERIAL PRIMARY KEY,vendor_id int,user_id int,created_at timestamp DEFAULT now())`);
    await q("CREATE INDEX IF NOT EXISTS idx_vendors_public_list ON vendors(status,ad_type,expire_at)");
    await q("CREATE INDEX IF NOT EXISTS idx_vendors_region_category ON vendors(region,category)");
    await q("CREATE INDEX IF NOT EXISTS idx_reviews_vendor_status ON reviews(vendor_id,status)");
    await q("CREATE INDEX IF NOT EXISTS idx_favorites_user_vendor ON favorites(user_id,vendor_id)");
    await q("CREATE INDEX IF NOT EXISTS idx_view_logs_vendor_created ON vendor_view_logs(vendor_id,created_at)");
    await q("CREATE INDEX IF NOT EXISTS idx_inquiries_status_created ON inquiries(status,created_at)");
    await q("CREATE INDEX IF NOT EXISTS idx_ad_requests_status_payment ON vendor_ad_requests(status,payment_status)");
    await q("CREATE INDEX IF NOT EXISTS idx_banner_requests_status_payment ON vendor_banner_requests(status,payment_status)");"""
          if 'idx_vendors_public_list' not in s:
            s=s.replace(marker,add)
          p.write_text(s)
          Path('.github/workflows/perf-index-stage1.yml').unlink(missing_ok=True)
          PY
          node --check server.js
      - name: Commit index fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then echo "No index changes"; else git commit -m "Add database indexes for core queries" && git push; fi
