name: SEO robots sitemap

on:
  push:
    paths:
      - '.github/workflows/seo-robots-sitemap.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Add robots and sitemap routes
        run: |
          python3 <<'PY'
          from pathlib import Path
          p=Path('server.js')
          s=p.read_text()
          marker="app.get('/',async(req,res)=>res.render('index',await homeData(req)));"
          block="""
app.get('/robots.txt',(req,res)=>{
  const base=`${req.protocol}://${req.get('host')}`;
  res.type('text/plain').send(`User-agent: *\nAllow: /\nDisallow: /admin\nDisallow: /vendor-dashboard\nDisallow: /mypage\nSitemap: ${base}/sitemap.xml\n`);
});
app.get('/sitemap.xml',async(req,res)=>{
  const base=`${req.protocol}://${req.get('host')}`;
  const rows=await q("SELECT id,created_at FROM vendors WHERE status='active' AND ad_type<>'none' AND expire_at IS NOT NULL AND expire_at>=CURRENT_DATE ORDER BY id DESC LIMIT 5000");
  const staticUrls=['/','/advertise','/apply'].map(path=>`  <url><loc>${base}${path}</loc><changefreq>weekly</changefreq><priority>${path==='/'?'1.0':'0.6'}</priority></url>`);
  const vendorUrls=rows.rows.map(v=>`  <url><loc>${base}/vendor/${v.id}</loc><changefreq>weekly</changefreq><priority>0.8</priority></url>`);
  res.type('application/xml').send(`<?xml version="1.0" encoding="UTF-8"?>\n<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n${staticUrls.concat(vendorUrls).join('\n')}\n</urlset>`);
});
"""
          if "app.get('/robots.txt'" not in s:
            s=s.replace(marker,block+marker)
          p.write_text(s)
          Path('.github/workflows/seo-robots-sitemap.yml').unlink(missing_ok=True)
          PY
          node --check server.js
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then echo "No changes"; else git commit -m "Add robots and sitemap routes" && git push; fi
