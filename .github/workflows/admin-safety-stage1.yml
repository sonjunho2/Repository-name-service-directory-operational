name: Admin safety stage 1

on:
  push:
    paths:
      - '.github/workflows/admin-safety-stage1.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Apply admin request safety fixes
        run: |
          python3 <<'PY'
          from pathlib import Path
          p=Path('server.js')
          s=p.read_text()
          s=s.replace("app.post('/admin/reports/:id/done',admin,async(req,res)=>{await q('UPDATE flags SET status=$1, admin_memo=$2, processed_at=now() WHERE id=$3',['done',(req.body.admin_memo||'').slice(0,500),req.params.id]); await logAdmin(req,'신고 처리완료','report',req.params.id,req.body.admin_memo||''); res.redirect('/admin#reports');});",
                      "app.post('/admin/reports/:id/done',admin,async(req,res)=>{await q(\"UPDATE flags SET status=$1, admin_memo=$2, processed_at=now() WHERE id=$3 AND status='new'\",['done',(req.body.admin_memo||'').slice(0,500),req.params.id]); await logAdmin(req,'신고 처리완료','report',req.params.id,req.body.admin_memo||''); res.redirect('/admin#reports');});")
          s=s.replace("app.post('/admin/inquiries/:id/reject',admin,async(req,res)=>{await q('UPDATE inquiries SET status=$1 WHERE id=$2',['rejected',req.params.id]); await logAdmin(req,'입점신청 반려','inquiry',req.params.id,'신청 반려'); res.redirect('/admin#inquiries');});",
                      "app.post('/admin/inquiries/:id/reject',admin,async(req,res)=>{await q(\"UPDATE inquiries SET status=$1 WHERE id=$2 AND status='new'\",['rejected',req.params.id]); await logAdmin(req,'입점신청 반려','inquiry',req.params.id,'신청 반려'); res.redirect('/admin#inquiries');});")
          s=s.replace("  if(x.type!=='apply')return res.redirect('/admin#inquiries');", "  if(x.type!=='apply'||x.status!=='new')return res.redirect('/admin#inquiries');")
          s=s.replace("app.post('/admin/inquiries/:id/banner',admin,async(req,res)=>{const r=await q('SELECT * FROM inquiries WHERE id=$1',[req.params.id]); const x=r.rows[0]; if(!x||!x.banner_image_data||x.banner_status==='approved')return res.redirect('/admin#inquiries'); await q('INSERT INTO banners(title,subtitle,link_url,position,sort_order,is_active,image_data) VALUES($1,$2,$3,$4,$5,$6,$7)',[x.company_name||'입점신청 배너','입점신청으로 등록된 배너','#','premium',0,true,x.banner_image_data]); await q('UPDATE inquiries SET banner_status=$1 WHERE id=$2',['approved',x.id]); await logAdmin(req,'입점신청 배너등록','inquiry',x.id,x.company_name||''); res.redirect('/admin#inquiries');});",
                      "app.post('/admin/inquiries/:id/banner',admin,async(req,res)=>{const r=await q('SELECT * FROM inquiries WHERE id=$1',[req.params.id]); const x=r.rows[0]; if(!x||!x.banner_image_data||x.banner_status==='approved')return res.redirect('/admin#inquiries'); await q('INSERT INTO banners(title,subtitle,link_url,position,sort_order,is_active,image_data) VALUES($1,$2,$3,$4,$5,$6,$7)',[x.company_name||'입점신청 배너','입점신청으로 등록된 배너','#','premium',0,true,x.banner_image_data]); await q(\"UPDATE inquiries SET banner_status=$1 WHERE id=$2 AND COALESCE(banner_status,'new')<>'approved'\",['approved',x.id]); await logAdmin(req,'입점신청 배너등록','inquiry',x.id,x.company_name||''); res.redirect('/admin#inquiries');});")
          p.write_text(s)
          Path('.github/workflows/admin-safety-stage1.yml').unlink(missing_ok=True)
          PY
          node --check server.js
      - name: Commit admin safety fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then echo "No admin safety changes"; else git commit -m "Add admin request status safeguards" && git push; fi
