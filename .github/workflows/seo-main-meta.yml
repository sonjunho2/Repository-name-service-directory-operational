name: SEO main meta

on:
  push:
    paths:
      - '.github/workflows/seo-main-meta.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add main SEO meta tags
        run: |
          python3 <<'PY'
          from pathlib import Path
          p=Path('views/index.ejs')
          s=p.read_text()
          old='  <title>서비스 디렉터리</title>\n  <link rel="stylesheet" href="/public/css/style.css">'
          new='''  <title>서비스 디렉터리 - 지역별 추천업체 모음</title>
  <meta name="description" content="지역별 추천업체, 프리미엄 업체, 후기와 연락처를 한곳에서 확인할 수 있는 서비스 디렉터리입니다.">
  <meta name="robots" content="index,follow">
  <meta property="og:type" content="website">
  <meta property="og:title" content="서비스 디렉터리 - 지역별 추천업체 모음">
  <meta property="og:description" content="지역별 추천업체와 프리미엄 업체 정보를 빠르게 확인하세요.">
  <meta property="og:site_name" content="서비스 디렉터리">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="canonical" href="/">
  <link rel="stylesheet" href="/public/css/style.css">'''
          if '<meta name="description"' not in s:
            s=s.replace(old,new)
          p.write_text(s)
          Path('.github/workflows/seo-main-meta.yml').unlink(missing_ok=True)
          PY
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then echo "No changes"; else git commit -m "Add main SEO meta tags" && git push; fi
