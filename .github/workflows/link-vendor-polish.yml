name: Link vendor polish

on:
  push:
    paths:
      - '.github/workflows/link-vendor-polish.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  link:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Link stylesheet
        run: |
          python3 <<'PY'
          from pathlib import Path
          p = Path('views/vendor-dashboard.ejs')
          s = p.read_text()
          link = '<link rel="stylesheet" href="/public/css/vendor-dashboard-polish.css">'
          if link not in s:
              s = s.replace('<link rel="stylesheet" href="/public/css/style.css">', '<link rel="stylesheet" href="/public/css/style.css">\n' + link)
              p.write_text(s)
          old = Path('public/css/ui-polish.css')
          if old.exists(): old.unlink()
          Path('.github/workflows/link-vendor-polish.yml').unlink(missing_ok=True)
          PY
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then echo "No changes"; else git commit -m "Link vendor polish stylesheet" && git push; fi
