name: Security login stage 1

on:
  push:
    paths:
      - '.github/workflows/security-login-stage1.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Add login rate limit and cookie hardening
        run: |
          python3 <<'PY'
          from pathlib import Path
          p=Path('server.js')
          s=p.read_text()
          old="app.set('view engine','ejs'); app.use(express.urlencoded({extended:true,limit:'10mb'})); app.use(express.json({limit:'10mb'})); app.use('/public',express.static('public',{maxAge:'7d',etag:true}));\napp.use(session({store:new PgSession({pool,createTableIfMissing:true}), secret:process.env.SESSION_SECRET||'dev-secret', resave:false, saveUninitialized:false, cookie:{maxAge:1000*60*60*12}}));"
          new="app.set('trust proxy',1); app.set('view engine','ejs'); app.use(express.urlencoded({extended:true,limit:'10mb'})); app.use(express.json({limit:'10mb'})); app.use('/public',express.static('public',{maxAge:'7d',etag:true}));\napp.use(session({store:new PgSession({pool,createTableIfMissing:true}), secret:process.env.SESSION_SECRET||'dev-secret', resave:false, saveUninitialized:false, cookie:{maxAge:1000*60*60*12,httpOnly:true,sameSite:'lax',secure:process.env.NODE_ENV==='production'}}));"
          s=s.replace(old,new)
          if 'const loginAttempts=new Map()' not in s:
            marker="function formatKstDate(value){"
            block="""const loginAttempts=new Map();
function loginAttemptKey(req,username,prefix='login'){
  return prefix+':'+(req.ip||req.headers['x-forwarded-for']||'ip')+':'+String(username||'').toLowerCase();
}
function loginBlocked(req,username,prefix='login'){
  const key=loginAttemptKey(req,username,prefix);
  const x=loginAttempts.get(key);
  if(!x)return false;
  if(Date.now()>x.until){loginAttempts.delete(key);return false;}
  return true;
}
function loginFail(req,username,prefix='login'){
  const key=loginAttemptKey(req,username,prefix);
  const x=loginAttempts.get(key)||{count:0,until:0};
  x.count+=1;
  if(x.count>=10)x.until=Date.now()+1000*60*15;
  loginAttempts.set(key,x);
}
function loginSuccess(req,username,prefix='login'){
  loginAttempts.delete(loginAttemptKey(req,username,prefix));
}
"""
            s=s.replace(marker,block+marker)
          old_login="app.get('/login',(req,res)=>res.render('login',{mode:'login',error:null})); app.post('/login',async(req,res)=>{const username=(req.body.username||'').trim(); const u=await q('SELECT * FROM users WHERE username=$1',[username]); if(!u.rows[0]||u.rows[0].status!=='active'||!await bcrypt.compare(req.body.password||'',u.rows[0].password_hash)) return res.render('login',{mode:'login',error:'아이디 또는 비밀번호가 올바르지 않습니다.'}); req.session.user={id:u.rows[0].id,username:u.rows[0].username,nickname:u.rows[0].nickname,role:u.rows[0].role,is_vendor:u.rows[0].is_vendor,vendor_id:u.rows[0].vendor_id}; res.redirect(u.rows[0].role==='admin'?'/admin':u.rows[0].is_vendor?'/vendor-dashboard':'/');});"
          new_login="app.get('/login',(req,res)=>res.render('login',{mode:'login',error:null})); app.post('/login',async(req,res)=>{const username=(req.body.username||'').trim(); if(loginBlocked(req,username,'user'))return res.status(429).render('login',{mode:'login',error:'로그인 시도가 많습니다. 15분 후 다시 시도해주세요.'}); const u=await q('SELECT * FROM users WHERE username=$1',[username]); if(!u.rows[0]||u.rows[0].status!=='active'||!await bcrypt.compare(req.body.password||'',u.rows[0].password_hash)){loginFail(req,username,'user'); return res.render('login',{mode:'login',error:'아이디 또는 비밀번호가 올바르지 않습니다.'});} loginSuccess(req,username,'user'); req.session.regenerate(err=>{if(err)return res.render('login',{mode:'login',error:'로그인 처리 중 오류가 발생했습니다.'}); req.session.user={id:u.rows[0].id,username:u.rows[0].username,nickname:u.rows[0].nickname,role:u.rows[0].role,is_vendor:u.rows[0].is_vendor,vendor_id:u.rows[0].vendor_id}; res.redirect(u.rows[0].role==='admin'?'/admin':u.rows[0].is_vendor?'/vendor-dashboard':'/');});});"
          s=s.replace(old_login,new_login)
          old_admin="app.get('/admin/login',(req,res)=>res.render('admin-login',{error:null})); app.post('/admin/login',async(req,res)=>{const u=await q('SELECT * FROM users WHERE username=$1 AND role=$2',[req.body.username,'admin']); if(!u.rows[0]||!await bcrypt.compare(req.body.password,u.rows[0].password_hash)) return res.render('admin-login',{error:'관리자 로그인 실패'}); req.session.user={id:u.rows[0].id,username:u.rows[0].username,nickname:u.rows[0].nickname,role:'admin',is_vendor:u.rows[0].is_vendor,vendor_id:u.rows[0].vendor_id}; res.redirect('/admin');});"
          new_admin="app.get('/admin/login',(req,res)=>res.render('admin-login',{error:null})); app.post('/admin/login',async(req,res)=>{const username=(req.body.username||'').trim(); if(loginBlocked(req,username,'admin'))return res.status(429).render('admin-login',{error:'로그인 시도가 많습니다. 15분 후 다시 시도해주세요.'}); const u=await q('SELECT * FROM users WHERE username=$1 AND role=$2',[username,'admin']); if(!u.rows[0]||!await bcrypt.compare(req.body.password||'',u.rows[0].password_hash)){loginFail(req,username,'admin'); return res.render('admin-login',{error:'관리자 로그인 실패'});} loginSuccess(req,username,'admin'); req.session.regenerate(err=>{if(err)return res.render('admin-login',{error:'로그인 처리 중 오류가 발생했습니다.'}); req.session.user={id:u.rows[0].id,username:u.rows[0].username,nickname:u.rows[0].nickname,role:'admin',is_vendor:u.rows[0].is_vendor,vendor_id:u.rows[0].vendor_id}; res.redirect('/admin');});});"
          s=s.replace(old_admin,new_admin)
          p.write_text(s)
          Path('.github/workflows/security-login-stage1.yml').unlink(missing_ok=True)
          PY
          node --check server.js
          node --check restore-routes.js
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then echo "No changes"; else git commit -m "Harden login session security" && git push; fi
