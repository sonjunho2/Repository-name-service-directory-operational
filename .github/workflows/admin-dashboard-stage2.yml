name: Admin dashboard stage 2

on:
  push:
    paths:
      - '.github/workflows/admin-dashboard-stage2.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Add weekly and yearly dashboard stats
        run: |
          python3 <<'PY'
          from pathlib import Path
          p=Path('server.js')
          s=p.read_text()
          if 'weekViews:' not in s:
            s=s.replace('todayViews:await scalar("SELECT COUNT(*) v FROM vendor_view_logs WHERE created_at>=CURRENT_DATE"),', 'todayViews:await scalar("SELECT COUNT(*) v FROM vendor_view_logs WHERE created_at>=CURRENT_DATE"),\n    weekViews:await scalar("SELECT COUNT(*) v FROM vendor_view_logs WHERE created_at>=date_trunc(\'week\',CURRENT_DATE)"),\n    monthViews:await scalar("SELECT COUNT(*) v FROM vendor_view_logs WHERE created_at>=date_trunc(\'month\',CURRENT_DATE)"),')
            s=s.replace('todayUsers:await scalar("SELECT COUNT(*) v FROM users WHERE created_at>=CURRENT_DATE"),', 'todayUsers:await scalar("SELECT COUNT(*) v FROM users WHERE created_at>=CURRENT_DATE"),\n    weekUsers:await scalar("SELECT COUNT(*) v FROM users WHERE created_at>=date_trunc(\'week\',CURRENT_DATE)"),')
            s=s.replace('monthRevenue:await scalar("SELECT COALESCE(SUM(krw_price),0) v FROM payment_logs WHERE date_trunc(\'month\',paid_at)=date_trunc(\'month\',CURRENT_DATE)"),', 'monthRevenue:await scalar("SELECT COALESCE(SUM(krw_price),0) v FROM payment_logs WHERE date_trunc(\'month\',paid_at)=date_trunc(\'month\',CURRENT_DATE)"),\n    yearRevenue:await scalar("SELECT COALESCE(SUM(krw_price),0) v FROM payment_logs WHERE date_trunc(\'year\',paid_at)=date_trunc(\'year\',CURRENT_DATE)"),')
          p.write_text(s)
          Path('.github/workflows/admin-dashboard-stage2.yml').unlink(missing_ok=True)
          PY
          node --check server.js
          node --check restore-routes.js
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then echo "No changes"; else git commit -m "Add weekly and yearly dashboard stats" && git push; fi
